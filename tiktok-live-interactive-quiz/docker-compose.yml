version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: tiktok-quiz-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: tiktok-quiz
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  backend:
    build: ./backend
    container_name: tiktok-quiz-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/tiktok-quiz
      MONGODB_DB: tiktok-quiz
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: tiktok-quiz-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:5000"
      NEXT_PUBLIC_SOCKET_URL: "http://localhost:5000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongodb_data:

networks:
  default:
    name: tiktok-quiz-network
