version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: tiktok-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: tiktok_live_auth
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - tiktok-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth API
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tiktok-auth-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/tiktok_live_auth
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - tiktok-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    driver: local

networks:
  tiktok-network:
    driver: bridge
