<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Login...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Processing Login...</h2>
        <p id="subtitle">Please wait while we sign you in</p>
        <div id="message" class="message"></div>
        <a href="/" class="btn" id="homeBtn" style="display: none;">Go to Home</a>
    </div>

    <script>
        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const accessToken = urlParams.get('accessToken');
            const refreshToken = urlParams.get('refreshToken');
            const error = urlParams.get('error');

            if (error) {
                showError('Login failed: ' + decodeURIComponent(error));
                return;
            }

            if (!accessToken || !refreshToken) {
                showError('Invalid callback: Missing tokens');
                return;
            }

            try {
                // Store tokens
                localStorage.setItem('accessToken', accessToken);
                localStorage.setItem('refreshToken', refreshToken);

                // Get user profile
                const response = await fetch('http://localhost:3001/api/v1/me', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // Success
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('title').textContent = '✅ Login Successful!';
                    document.getElementById('subtitle').textContent = `Welcome, ${data.data.user.name}!`;
                    
                    const messageDiv = document.getElementById('message');
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    messageDiv.textContent = 'Redirecting to dashboard...';

                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    showError('Failed to get user profile');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = '❌ Login Failed';
            document.getElementById('subtitle').textContent = '';
            
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
            messageDiv.textContent = message;

            document.getElementById('homeBtn').style.display = 'inline-block';
        }

        // Run on page load
        handleCallback();
    </script>
</body>
</html>
